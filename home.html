<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home of Github issue</title>

    <!-- tailwind and daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css style -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#F8FAFC]">
    <header>
        <nav>
            <div class="navbar bg-base-100 flex flex-col md:flex-row shadow-sm justify-between gap-0 md:gap-y-4 px-15 ">
                <div class="flex items-center">
                    <img class="h-[37px] w-[36px]" src="assets/github-logo.png" alt="">
                    <a class="btn btn-ghost text-2xl pl-1 black-text">GitHub Issues Tracker</a>
                </div>
                <div class="flex gap-4">
                    <!-- for search -->
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search issues..." />
                    </label>
                    <div class="dropdown dropdown-end">
                        <button class="btn bg-[#4A00FF] text-white w-[120px]">+ New Issue</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- tab buttons section -->
    <section class="w-[80%] mx-auto pt-13 pb-4">
        <div id="tab-btn-containers" class="bg-white p-6 shadow-md rounded-lg flex gap-2">
            <button onclick="loadAllIssues()" id="btn-all" class="btn bg-[#4A00FF] text-white">All</button>
            <button id="btn-open" class="btn bg-[#4A00FF] text-white">Open</button>
            <button id="btn-closed" class="btn bg-[#4A00FF] text-white">Closed</button>
        </div>
    </section>

    <!-- no -->
    <section class="w-[80%] mx-auto pb-4">
        <div class="bg-white p-6 shadow-sm rounded-lg flex items-center justify-between">
            <!-- left side -->
            <div class="flex items-center gap-2">
                <div class="bg-[#ECE4FF] rounded-full p-2">
                    <img src="assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="text-xl font-semibold black-text"><span id="count">0 </span> Issues</h2>
                    <p class="gray-text font-normal">Track and manage your project issues</p>
                </div>

            </div>
            <!-- right side -->
            <div class="flex items-center gap-4 black-text font-medium">
                <div class="flex items-center gap-2">
                    <div class="h-3 w-3 bg-[#00a96e] rounded-full">
                    </div>
                    <p>Open</p>
                </div>
                <div class="flex items-center gap-2">
                    <div class="h-3 w-3 bg-[#a855f7] rounded-full">
                    </div>
                    <p>Closed</p>
                </div>

            </div>

        </div>

    </section>

    <!-- card section -->
    <section class="w-[80%] mx-auto bg-[#f8fafc] mt-[-15px]">
        <!-- card container -->
        <div id="cards-container" class="grid grid-cols-4 gap-3 bg-[#fbfbfb] shadow-md p-3">


        </div>

    </section>




    <script src="script/home.js"></script>
</body>

</html>
